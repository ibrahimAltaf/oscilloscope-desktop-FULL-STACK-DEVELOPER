openapi: 3.0.3
info:
  title: Oscilloscope Backend API
  version: 1.0.0
  description: |
    Cloud API and documentation surface for the Hantek Oscilloscope Desktop application.

    ## Architecture

    ```
    Vercel Cloud  (this service)
      ✓  Swagger / OpenAPI interactive documentation
      ✓  Health check   GET /health
      ✓  Simulated signal demo   GET /signal/batch
      ✓  RPC protocol reference  GET /rpc-reference
      ✗  No real hardware access

    Windows Local Machine  (Electron Desktop App)
      ✓  Hantek DLL  (HTHardDll.dll / HT6000.dll)  via USB
      ✓  Python hardware_service.py  (JSON-RPC over stdio)
      ✓  Real-time ADC capture  up to 1 MSa/s
      ✓  Waveform + FFT display
      ✓  12-point hardware verification report
    ```

    Hardware-only endpoints return:
    > "Hardware operations require the local Electron Windows app."

  contact:
    name: Oscilloscope Desktop
  license:
    name: MIT

servers:
  - url: https://oscilloscope-backend.vercel.app
    description: Vercel cloud deployment
  - url: http://127.0.0.1:8765
    description: Local development server (uvicorn)

tags:
  - name: health
    description: Service health and liveness
  - name: dll
    description: DLL inspection and function mapping — hardware-only operations
  - name: device
    description: Device connection management — hardware-only
  - name: capture
    description: Signal capture control — hardware-only
  - name: signal
    description: Signal data endpoints — simulation demo available in cloud
  - name: hardware
    description: Hardware status and 12-point verification report
  - name: logs
    description: Log streaming reference
  - name: docs
    description: API and RPC documentation reference

paths:

  # ── Health ──────────────────────────────────────────────────────────────────

  /:
    get:
      tags: [health]
      summary: Service root
      description: Returns service info with links to docs, health, and demo endpoints.
      operationId: root
      responses:
        "200":
          description: Service information
          content:
            application/json:
              schema:
                type: object
                properties:
                  service: { type: string, example: oscilloscope-backend }
                  version: { type: string, example: "1.0.0" }
                  mode: { type: string, example: cloud }
                  docs: { type: string, example: /docs }
                  health: { type: string, example: /health }
                  signal_demo: { type: string, example: /signal/batch }
                  rpc_reference: { type: string, example: /rpc-reference }
                  note: { type: string }

  /health:
    get:
      tags: [health]
      summary: Health check
      description: Returns `ok` with current UTC time. Use to verify the service is reachable.
      operationId: health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, mode, time_utc]
                properties:
                  status:
                    type: string
                    enum: [ok]
                    example: ok
                  mode:
                    type: string
                    enum: [cloud]
                    example: cloud
                  time_utc:
                    type: string
                    format: date-time
                    example: "2024-01-01T12:00:00.000000+00:00"

  # ── DLL ─────────────────────────────────────────────────────────────────────

  /dll/select:
    post:
      tags: [dll]
      summary: Record DLL path
      description: |
        Records the path to the Hantek SDK DLL for this session.

        In the Electron app this triggers a file-system check and updates the
        hardware status panel.  In cloud mode the path is stored in memory only —
        no file-system operations are performed.
      operationId: dll_select
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectDllRequest'
            example:
              dll_path: "C:/Hantek/HTHardDll.dll"
      responses:
        "200":
          description: DLL path recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'
        "422":
          $ref: '#/components/responses/ValidationError'

  /dll/inspect:
    post:
      tags: [dll]
      summary: Inspect DLL exports (Hardware Only)
      description: |
        **Hardware Only.**  Runs `dumpbin /exports` on the selected DLL and returns
        the full list of exported function names.

        Used to verify that the required Hantek SDK exports (`HT_Init`,
        `HT_OpenDevice`, `HT_StartCapture`, `HT_ReadData`, etc.) are present
        before mapping them.

        Requires the Electron app running on a local Windows machine.
      operationId: dll_inspect
      responses:
        "200":
          description: Export list or hardware-only informational message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'
              example:
                ok: false
                message: "Hardware operations require the local Electron Windows app."
                status:
                  dll_path: ""
                  dll_found: false
                  verification_reason: "Cloud service — hardware operations require the local Electron Windows app."

  /dll/exports:
    get:
      tags: [dll]
      summary: Get cached DLL exports (Hardware Only)
      description: |
        **Hardware Only.**  Returns the cached DLL export list populated after
        `POST /dll/inspect`.

        Requires the Electron app on a local Windows machine.
      operationId: dll_exports
      responses:
        "200":
          description: Cached export list or hardware-only message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'

  # ── Device ──────────────────────────────────────────────────────────────────

  /device/connect:
    post:
      tags: [device]
      summary: Connect hardware device (Hardware Only)
      description: |
        **Hardware Only.**  Loads the Hantek DLL and calls `HT_OpenDevice` with
        the specified device index and export map.

        On success the device handle is retained for subsequent capture calls.
        Requires the Electron app on a Windows machine with the Hantek oscilloscope
        connected via USB.
      operationId: device_connect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectRequest'
      responses:
        "200":
          description: Connection result or hardware-only message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'
        "422":
          $ref: '#/components/responses/ValidationError'

  /device/disconnect:
    post:
      tags: [device]
      summary: Disconnect device (Hardware Only)
      description: |
        **Hardware Only.**  Calls `HT_CloseDevice` and releases the DLL handle.

        Requires the Electron app on a local Windows machine.
      operationId: device_disconnect
      responses:
        "200":
          description: Disconnect result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'

  # ── Capture ─────────────────────────────────────────────────────────────────

  /capture/start:
    post:
      tags: [capture]
      summary: Start real-time capture (Hardware Only)
      description: |
        **Hardware Only.**  Starts the background capture thread that continuously
        calls `HT_ReadData` and emits `sample_batch` events to the Electron renderer.

        `chunk_size` controls how many ADC samples are read per DLL call (default 2048).
        Requires an open device connection.
      operationId: capture_start
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartCaptureRequest'
      responses:
        "200":
          description: Capture start result or hardware-only message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'
        "422":
          $ref: '#/components/responses/ValidationError'

  /capture/stop:
    post:
      tags: [capture]
      summary: Stop capture (Hardware Only)
      description: |
        **Hardware Only.**  Signals the capture thread to stop and waits for clean exit.
      operationId: capture_stop
      responses:
        "200":
          description: Capture stop result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'

  # ── Signal ──────────────────────────────────────────────────────────────────

  /signal/batch:
    get:
      tags: [signal]
      summary: Get signal batch (simulation demo in cloud)
      description: |
        Returns a signal batch.

        **Cloud mode:** Returns a simulated 1 kHz sine wave at 10 kSa/s for
        demo and integration testing.

        **Local Electron app:** Returns real ADC samples from the Hantek oscilloscope
        at the configured sample rate (up to 1 MSa/s), scaled to volts.
      operationId: signal_batch
      responses:
        "200":
          description: Signal batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalBatch'

  /buffer/summary:
    get:
      tags: [signal]
      summary: Circular buffer summary
      description: |
        Returns a summary of the signal circular buffer.

        In cloud mode the buffer is always empty — capture is hardware-only.
      operationId: buffer_summary
      responses:
        "200":
          description: Buffer summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BufferSummary'

  # ── Hardware ─────────────────────────────────────────────────────────────────

  /hardware/status:
    get:
      tags: [hardware]
      summary: Current hardware status
      description: |
        Returns the current hardware verification status snapshot.

        In cloud mode all hardware fields are `false` / empty.
        Connect via the Electron app for real hardware status.
      operationId: hardware_status
      responses:
        "200":
          description: Hardware status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'

  /hardware/report:
    get:
      tags: [hardware]
      summary: 12-point hardware verification report
      description: |
        Returns the full 12-point hardware verification report.

        **Checklist:**
        1. DLL file found on disk
        2. DLL architecture matches Python process (x64/x86)
        3. DLL successfully loaded into process memory
        4. Required SDK exports present in DLL
        5. SDK functions mapped to logical names
        6. Device detected on USB bus
        7. Device connected — handle valid after `HT_OpenDevice`
        8. Capture started without SDK error
        9. Capture thread alive and polling
        10. Real (non-zero) ADC data received
        11. No persistent zero-data warning (cable / probe OK)
        12. SDK error code is 0 (SUCCESS) throughout

        In cloud mode all checks are `false`.
        The Electron app generates the real report after live hardware capture.
      operationId: hardware_report
      responses:
        "200":
          description: Verification report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcResponse'

  /status:
    get:
      tags: [hardware]
      summary: Service status
      description: Returns current service status. Cloud mode — simulation=true, running=false.
      operationId: service_status
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'

  # ── Logs ────────────────────────────────────────────────────────────────────

  /logs:
    get:
      tags: [logs]
      summary: Log stream reference
      description: |
        In the Electron app, logs are emitted via the Python → Electron IPC event
        stream (not HTTP).  This endpoint returns reference information about the
        log format and event structure.
      operationId: logs
      responses:
        "200":
          description: Log stream reference info
          content:
            application/json:
              schema:
                type: object
                properties:
                  note: { type: string }
                  event_type: { type: string, example: log }
                  format:
                    type: object
                    properties:
                      level: { type: string, example: "DEBUG | INFO | WARNING | ERROR" }
                      message: { type: string }
                  example_event:
                    type: object

  # ── Docs ─────────────────────────────────────────────────────────────────────

  /rpc-reference:
    get:
      tags: [docs]
      summary: JSON-RPC protocol reference
      description: |
        Full reference for the JSON-RPC protocol used between the Electron main
        process and the Python `hardware_service.py` subprocess.

        **Transport:** Electron spawns Python via `child_process.spawn`.
        Requests are written to Python's stdin as newline-delimited JSON.
        Responses and push events are read from Python's stdout as
        newline-delimited JSON.
      operationId: rpc_reference
      responses:
        "200":
          description: RPC method catalog and event stream reference
          content:
            application/json:
              schema:
                type: object

# ── Components ────────────────────────────────────────────────────────────────

components:

  schemas:

    SelectDllRequest:
      type: object
      required: [dll_path]
      properties:
        dll_path:
          type: string
          description: Absolute or relative path to the Hantek SDK DLL
          example: "C:/Hantek/HTHardDll.dll"

    MapFunctionsRequest:
      type: object
      description: Maps logical SDK function names to actual DLL export names
      properties:
        initialize:
          type: string
          default: HT_Init
          description: DLL export name for SDK initialization
        open_device:
          type: string
          default: HT_OpenDevice
          description: DLL export name for opening the device
        close_device:
          type: string
          default: HT_CloseDevice
          description: DLL export name for closing the device
        start_capture:
          type: string
          default: HT_StartCapture
          description: DLL export name for starting ADC capture
        stop_capture:
          type: string
          default: HT_StopCapture
          description: DLL export name for stopping capture
        read_data:
          type: string
          default: HT_ReadData
          description: DLL export name for reading ADC sample data

    ConnectRequest:
      type: object
      properties:
        device_index:
          type: integer
          default: 0
          minimum: 0
          description: USB device index (0 = first connected oscilloscope)
        export_map:
          $ref: '#/components/schemas/MapFunctionsRequest'

    StartCaptureRequest:
      type: object
      properties:
        chunk_size:
          type: integer
          default: 2048
          minimum: 64
          maximum: 65536
          description: ADC samples per DLL read call

    HardwareStatus:
      type: object
      description: Complete hardware verification state
      properties:
        dll_path:
          type: string
          description: Recorded DLL file path
        dll_found:
          type: boolean
          description: DLL file exists on disk
        dll_arch:
          type: string
          enum: [x64, x86, unknown]
          description: DLL architecture
        python_arch:
          type: string
          description: Python process architecture
        electron_arch:
          type: string
          description: Electron process architecture (x64/ia32)
        dll_loaded:
          type: boolean
          description: DLL successfully loaded into process memory
        exports:
          type: array
          items:
            type: string
          nullable: true
          description: Exported function names discovered in DLL
        mapped_functions:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Logical name → DLL export name mapping
        device_detected:
          type: boolean
          description: Hantek device detected on USB bus
        device_connected:
          type: boolean
          description: Device is open and handle is valid
        capture_started:
          type: boolean
          description: Capture started without SDK error
        capture_running:
          type: boolean
          description: Capture thread is alive and reading samples
        real_data_received:
          type: boolean
          description: At least one non-zero ADC sample batch received
        zero_data_warning:
          type: boolean
          description: ADC output consistently zero (cable / probe issue?)
        samples_received:
          type: integer
          description: Total ADC samples received since capture started
        last_min:
          type: integer
          nullable: true
          description: Minimum ADC code in last batch
        last_max:
          type: integer
          nullable: true
          description: Maximum ADC code in last batch
        last_variance:
          type: number
          format: double
          nullable: true
          description: Variance of last sample batch
        sdk_error_code:
          type: integer
          nullable: true
          description: Last Hantek SDK error code (0 = SUCCESS)
        last_error:
          type: string
          nullable: true
          description: Last error message from SDK or service
        final_status:
          type: string
          example: REAL HARDWARE VERIFIED
          description: 12-point verification result
        verification_reason:
          type: string
          description: Human-readable explanation of final_status

    RpcResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          description: Whether the operation succeeded
        message:
          type: string
          nullable: true
          description: Human-readable message
        status:
          allOf:
            - $ref: '#/components/schemas/HardwareStatus'
          nullable: true
          description: Current hardware status snapshot

    SignalBatch:
      type: object
      description: A batch of ADC samples (real or simulated)
      required: [batch_seq, t0, t0_unix, sample_rate_hz, sample_count, samples, mode, server_time_utc, ptp, rms]
      properties:
        batch_seq:
          type: integer
          description: Monotonically increasing batch sequence number
        t0:
          type: number
          format: double
          description: Batch start timestamp (Unix epoch seconds)
        t0_unix:
          type: number
          format: double
          description: Alias for t0
        sample_rate_hz:
          type: number
          format: double
          description: ADC sample rate in Hz
        sample_count:
          type: integer
          description: Number of samples in this batch
        samples:
          type: array
          items:
            type: number
            format: float
          description: Sample values in volts (float32)
        mode:
          type: string
          enum: [simulation, hardware]
          description: "'simulation' in cloud mode, 'hardware' from Electron app"
        server_time_utc:
          type: string
          format: date-time
          description: Server wall-clock time at batch generation (ISO-8601)
        ptp:
          type: number
          format: float
          description: Peak-to-peak voltage amplitude
        rms:
          type: number
          format: float
          description: Root-mean-square voltage
        volt_div:
          type: number
          format: float
          default: 0.5
          description: Display volts per division
        time_div_s:
          type: number
          format: float
          default: 0.001
          description: Display seconds per division
        drops:
          type: integer
          default: 0
          description: Dropped batches due to slow consumer

    ServiceStatus:
      type: object
      description: Current service status
      required: [running, device_state, capture_state, buffer_seconds, sample_rate_hz, simulation, reconnect_failures, batches_sent, flat_runs, drops, volt_div, time_div_s]
      properties:
        running:
          type: boolean
          description: Whether capture is currently active
        device_state:
          type: string
          enum: [disconnected, connecting, connected, capturing, simulating, error]
          description: Device state machine value
        capture_state:
          type: string
          description: Capture state
        last_error:
          type: string
          nullable: true
          description: Last error message
        buffer_seconds:
          type: number
          description: Seconds of signal history in circular buffer
        sample_rate_hz:
          type: number
          description: Configured ADC sample rate in Hz
        simulation:
          type: boolean
          description: True when running in simulation mode (no hardware)
        reconnect_failures:
          type: integer
          description: Consecutive device reconnect failures
        batches_sent:
          type: integer
          description: Total signal batches sent since service start
        flat_runs:
          type: integer
          description: Consecutive zero-amplitude batches (quality gate counter)
        drops:
          type: integer
          description: Total WebSocket broadcast drops
        volt_div:
          type: number
          description: Volts per display division
        time_div_s:
          type: number
          description: Seconds per display division

    BufferSummary:
      type: object
      description: Summary of the signal circular buffer
      required: [frame_count, approx_duration_s, max_seconds]
      properties:
        frame_count:
          type: integer
          description: Frames currently in the circular buffer
        approx_duration_s:
          type: number
          description: Approximate total duration of buffered signal (seconds)
        max_seconds:
          type: number
          description: Maximum configured buffer depth (seconds)

    ValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
              msg:
                type: string
              type:
                type: string

  responses:
    ValidationError:
      description: Request body validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

# ── JSON-RPC Protocol Reference (informational / non-HTTP) ────────────────────
#
# Transport : Electron spawns Python via child_process.spawn
# Request   : stdin  newline-delimited JSON  { id, method, params }
# Response  : stdout newline-delimited JSON  { event: "rpc_response", payload: { request_id, ok, result, error } }
# Events    : stdout newline-delimited JSON  { event: "status"|"sample_batch"|"log", payload: {...} }
#
# Methods:
#   select_dll        { dll_path }                  → status event
#   inspect_dll       {}                             → status event  (Windows only)
#   map_sdk_functions { initialize, open_device, close_device, start_capture, stop_capture, read_data }
#   connect_device    { device_index, export_map }  → status event  (Windows + DLL required)
#   start_capture     { chunk_size }                → status + sample_batch stream
#   stop_capture      {}                             → status event
#   get_status        {}                             → rpc_response with status
#   disconnect_device {}                             → status event
#   shutdown          {}                             → (process exits)
#
# sample_batch payload: { timestamp_unix, samples: [int16], count, min, max, variance }
# status payload      : HardwareStatus schema above
# log payload         : { level: "INFO|WARNING|ERROR|DEBUG", message: str }
